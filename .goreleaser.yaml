version: 2
project_name: bookmux

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    dir: cmd/bookmux
    binary: bookmux
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE

nfpms:
  - vendor: Mykhaylo Merkulov
    homepage: https://github.com/MrZoidberg/bookmux
    maintainer: Mykhaylo Merkulov <mike@merkulov.me>
    description: A CLI tool for merging audio tracks into M4B audiobooks.
    license: MIT
    formats:
      - deb
      - rpm
      - apk

homebrew_casks:
  - name: bookmux
    repository:
      owner: MrZoidberg
      name: homebrew-apps
      branch: master
    directory: Casks
    homepage: https://github.com/MrZoidberg/bookmux
    description: A CLI tool for merging audio tracks into M4B audiobooks.
    license: MIT
    commit_author:
      name: MrZoidberg
      email: mike@merkulov.me
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    # Specify the binaries to be installed
    binaries: [bookmux]
    # xattr hook for mac binaries to remove quarantine
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/bookmux"]
          end

winget:
  - name: bookmux
    publisher: Mykhaylo Merkulov
    publisher_url: https://github.com/MrZoidberg
    publisher_support_url: https://github.com/MrZoidberg/bookmux/issues
    package_identifier: MrZoidberg.bookmux
    package_name: bookmux
    short_description: A CLI tool for merging audio tracks into M4B audiobooks.
    description: A CLI tool for merging audio tracks into M4B audiobooks.
    homepage: https://github.com/MrZoidberg/bookmux
    license: MIT
    license_url: https://github.com/MrZoidberg/bookmux/blob/main/LICENSE
    copyright: Mykhaylo Merkulov
    tags:
      - golang
      - cli
      - audiobook
      - ffmpeg
    release_notes: "{{.Changelog}}"
    commit_author:
      name: MrZoidberg
      email: mike@merkulov.me
    commit_msg_template: "WinGet manifest update for {{ .PackageIdentifier }} version {{ .Tag }}"
    repository:
      owner: MrZoidberg
      name: winget-pkgs
      branch: "winget-bookmux-{{.Version}}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

# scoops:
