name: E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    name: E2E Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        
    - name: Run E2E Tests
      run: go test -v -tags=e2e ./e2e
