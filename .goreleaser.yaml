#       owner: MrZoidberg
#       name: scoop-bucket
#       branch: main
#     homepage: https://github.com/MrZoidberg/bookmux
#     description: A CLI tool for merging audio tracks into M4B audiobooks.
#     license: MIT

checksum:
  name_template: 'checksums.txt'

snapshot:
  # snapshot is enabled by default

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

signs:
  - artifacts: checksum
    args: ["--batch", "-u", "{{ .Env.GPG_FINGERPRINT }}", "--output", "${signature}", "--detach-sign", "${artifact}"]
