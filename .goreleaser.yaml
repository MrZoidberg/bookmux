version: 2
project_name: bookmux

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    dir: cmd/bookmux
    binary: bookmux
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE

nfpms:
  - vendor: Mykhaylo Merkulov
    homepage: https://github.com/MrZoidberg/bookmux
    maintainer: Mykhaylo Merkulov <mike@merkulov.me>
    description: A CLI tool for merging audio tracks into audiobooks.
    license: MIT
    formats:
      - deb
      - rpm
      - apk

